<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Relatórios de Expedição</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<!-- EXCEL -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" defer></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js" defer></script>

<style>

body{
background:#f4f4f4;
font-family:Arial;
}

h1{
text-align:center;
margin:20px 0;
}

h2{
margin-left:20px;
margin-top:30px;
}

.filtro{
margin:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filtro select,
.filtro button{
padding:8px;
}

.tabela-container{
margin:20px;
background:white;
overflow-x:auto;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
text-align:center;
}

th{
background:#f4c430;
}

</style>

</head>

<body>

<div id="header-container"></div>

<h1>Relatórios de Armazém</h1>


<div class="filtro">

<select id="selectLote"></select>

<button onclick="gerarRelatorioDetalhado()">
Gerar Relatório
</button>

<button onclick="exportarExcelLote()">
Excel
</button>

<button onclick="exportarExcelGeral()">
Excel Geral
</button>

<button onclick="exportarPDF()">
PDF
</button>

</div>


<div id="resumo"></div>



<!-- ===================================================== -->
<!-- TABELA 1 - RELATÓRIO DETALHADO -->
<!-- ===================================================== -->

<h2>Relatório Detalhado</h2>

<div class="tabela-container">

<table id="tabelaDetalhada">

<thead>
<tr>
<th>Lote</th>
<th>RZ</th>
<th>Volume</th>
<th>Área</th>
<th>Rua</th>
<th>Status</th>
<th>Data</th>
<th>Hora</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>



<!-- ===================================================== -->
<!-- TABELA 2 - RESUMO POR ENDEREÇO -->
<!-- ===================================================== -->

<h2>Quantidade por Endereço</h2>

<div class="tabela-container">

<table id="tabelaRelatorio">

<thead>
<tr>
<th>Lote</th>
<th>Área</th>
<th>Rua</th>
<th>Gaylords</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>



<!-- ================= BASE DO SISTEMA ================= -->

<script src="js/supabase.js" defer></script>

<script src="js/model.js" defer></script>
<script src="js/state.js" defer></script>

<script src="js/utils.js" defer></script>

<!-- INTERFACE -->
<script src="js/header.js" defer></script>
<script src="js/login.js" defer></script>

<!-- RELATÓRIOS -->
<script src="js/relatorios/relatorios.js" defer></script>

</body>
</html>
