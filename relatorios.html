<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Relatórios de Expedição</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<!-- SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- EXCEL -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>

body{
background:#f4f4f4;
font-family:Arial;
}

h1{
text-align:center;
margin:20px 0;
}

.filtro{
margin:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filtro select,
.filtro button{
padding:8px;
}

.tabela-container{
margin:20px;
background:white;
overflow-x:auto;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
}

th{
background:#f4c430;
}

</style>

</head>

<body>

<div id="header-container"></div>

<script>

fetch("components/header.html")
.then(r=>r.text())
.then(html=>{

document.getElementById("header-container").innerHTML = html

if(typeof configurarHeader === "function"){
configurarHeader("relatorios")
}

})

</script>


<h1>Relatórios de Expedição</h1>


<div class="filtro">

<select id="selectLote"></select>

<button onclick="gerarRelatorio()">
Gerar Relatório
</button>

<button onclick="exportarExcelLote()">
Excel
</button>

<button onclick="exportarExcelGeral()">
Excel Geral
</button>

<button onclick="exportarPDF()">
PDF
</button>

</div>


<div id="resumo"></div>


<div class="tabela-container">

<table id="tabelaRelatorio">

<thead>
<tr>
<th>Lote</th>
<th>RZ</th>
<th>Volume</th>
<th>Status</th>
<th>Área</th>
<th>Rua</th>
<th>Data</th>
<th>Hora</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
<script src="js/login.js"></script>
<script src="js/guard.js"></script>

<!-- CONFIG SUPABASE -->
<script src="js/config.js"></script>

<!-- CLIENTE -->
<script src="js/supabaseClient.js"></script>

<!-- FUNÇÕES DO BANCO -->
<script src="js/supabase.js"></script>

<!-- STATE -->
<script src="js/state.js"></script>

<!-- UTIL -->
<script src="js/utils.js"></script>

<!-- RELATÓRIO -->
<script src="js/relatórios/relatorios.js"></script>
</body>
</html>
