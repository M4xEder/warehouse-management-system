<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Relatórios de Expedição</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<!-- EXCEL -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" defer></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js" defer></script>

<style>

body{
background:#f4f4f4;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:0;
}

h1{
text-align:center;
margin:20px 0;
}

h2{
margin:25px 20px 10px 20px;
}

.filtro{
margin:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

.filtro select,
.filtro button{
padding:8px 10px;
border-radius:4px;
border:1px solid #ccc;
cursor:pointer;
}

button{
background:#f4c430;
border:none;
}

button:hover{
background:#e6b800;
}

#resumo{
margin:20px;
font-size:15px;
font-weight:bold;
}

.tabela-container{
margin:20px;
background:white;
overflow-x:auto;
border-radius:6px;
box-shadow:0 0 4px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
text-align:center;
}

th{
background:#f4c430;
}

tbody tr:nth-child(even){
background:#fafafa;
}

</style>

</head>

<body>

<div id="header-container"></div>

<h1>Relatórios de Armazém</h1>


<!-- ========================================= -->
<!-- FILTROS -->
<!-- ========================================= -->

<div class="filtro">

<select id="selectLote">
<option value="">Todos os lotes</option>
</select>

<button onclick="gerarRelatorio()">
Gerar Relatório
</button>

<button onclick="exportarExcelLote()">
Excel
</button>

<button onclick="exportarExcelGeral()">
Excel Geral
</button>

<button onclick="exportarPDF()">
PDF
</button>

</div>


<div id="resumo">
Nenhum relatório gerado
</div>



<!-- ===================================================== -->
<!-- TABELA 1 - RELATÓRIO DETALHADO -->
<!-- ===================================================== -->

<h2>Relatório Detalhado</h2>

<div class="tabela-container">

<table id="tabelaDetalhada">

<thead>
<tr>
<th>Lote</th>
<th>RZ</th>
<th>Volume</th>
<th>Área</th>
<th>Rua</th>
<th>Status</th>
<th>Data</th>
<th>Hora</th>
</tr>
</thead>

<tbody>

<tr>
<td colspan="8">Clique em "Gerar Relatório"</td>
</tr>

</tbody>

</table>

</div>



<!-- ===================================================== -->
<!-- TABELA 2 - RESUMO POR ENDEREÇO -->
<!-- ===================================================== -->

<h2>Quantidade por Endereço</h2>

<div class="tabela-container">

<table id="tabelaRelatorio">

<thead>
<tr>
<th>Lote</th>
<th>Área</th>
<th>Rua</th>
<th>Gaylords</th>
</tr>
</thead>

<tbody>

<tr>
<td colspan="4">Clique em "Gerar Relatório"</td>
</tr>

</tbody>

</table>

</div>



<!-- ================= BASE DO SISTEMA ================= -->

<script src="js/supabase.js" defer></script>

<script src="js/model.js" defer></script>
<script src="js/state.js" defer></script>

<script src="js/utils.js" defer></script>

<!-- INTERFACE -->
<script src="js/header.js" defer></script>
<script src="js/login.js" defer></script>

<!-- RELATÓRIOS -->
<script src="js/relat0rios/relatorios.js" defer></script>

</body>
</html>
