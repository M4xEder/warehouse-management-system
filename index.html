<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciamento de Gaylords</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ========================= -->
<!-- HEADER DINÂMICO -->
<!-- ========================= -->
<div id="header-container"></div>

<h1>Gerenciamento de Gaylords</h1>

<!-- BUSCA -->
<div class="busca">
  <input id="buscaInput" placeholder="Buscar por lote ou RZ">
  <button onclick="buscar()">Buscar</button>
  <button onclick="limparBusca()">Limpar Destaque</button>
</div>

<!-- CADASTRAR ÁREA -->
<section class="cadastros">
  <h2>Cadastrar Área</h2>
  <input id="areaNome" placeholder="Nome da área">
  <button onclick="cadastrarArea()">Cadastrar Área</button>
</section>

<!-- CADASTRAR LOTE -->
<section class="cadastros">
  <h2>Cadastrar Lote</h2>
  <input id="loteNome" placeholder="Nome do lote">
  <input id="loteTotal" type="number" min="1" placeholder="Quantidade total">
  <button onclick="cadastrarLote()">Cadastrar Lote</button>
</section>

<!-- MAPA -->
<section id="mapa"></section>

<!-- DASHBOARD -->
<h2>Lotes Ativos</h2>
<div id="lotesAtivos"></div>

<h2>Lotes Expedidos</h2>
<div id="lotesExpedidos"></div>

<!-- ========================= -->
<!-- MODAL ENDEREÇAMENTO -->
<!-- ========================= -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Endereçar Gaylord</h3>

    <label>Lote:
      <select id="modalLote"></select>
    </label>

    <label>Volume:
      <input id="modalVolume">
    </label>

    <label>RZ:
      <input id="modalRz">
    </label>

    <div class="acoes">
      <button onclick="confirmarEndereco()">Salvar</button>
      <button onclick="removerGaylord()">Remover</button>
      <button onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- MODAL EXPEDIÇÃO -->
<!-- ========================= -->
<div id="modalExpedicao" class="modal hidden">
  <div class="modal-content" style="width:500px; max-height:80vh; overflow:auto">
    <h3>Expedir Gaylords</h3>

    <button onclick="selecionarTodosGaylords()">Selecionar todos</button>
    <button onclick="desmarcarTodosGaylords()">Desmarcar todos</button>

    <div id="listaExpedicao"></div>

    <div class="acoes">
      <button onclick="confirmarExpedicao()">Confirmar</button>
      <button onclick="fecharModalExpedicao()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ========================= -->
<!-- SUPABASE CDN (SEMPRE PRIMEIRO) -->
<!-- ========================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ========================= -->
<!-- CLIENTE SUPABASE (CRIA 1 VEZ) -->
<!-- ========================= -->
<script src="js/supabase.js"></script>

<!-- ========================= -->
<!-- LOGIN / AUTH -->
<!-- ========================= -->
<script src="js/login.js"></script>

<!-- ========================= -->
<!-- CARREGAR HEADER.HTML -->
<!-- ========================= -->
<script>
  fetch('header.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('header-container').innerHTML = data;
    });
</script>

<script src="js/header.js"></script>

<!-- ========================= -->
<!-- ESTADO E UTILITÁRIOS -->
<!-- ========================= -->
<script src="js/state.js"></script>
<script src="js/utils.js"></script>

<!-- ========================= -->
<!-- MÓDULOS DO SISTEMA -->
<!-- ========================= -->
<script src="js/lotes.js"></script>
<script src="js/modal.js"></script>
<script src="js/busca.js"></script>
<script src="js/mapa.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/expedicao.js"></script>

<!-- ========================= -->
<!-- MAIN (SEMPRE POR ÚLTIMO) -->
<!-- ========================= -->
<script src="js/main.js"></script>

</body>
</html>
