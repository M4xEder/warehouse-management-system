<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciamento de Gaylords</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- ========================= -->
  <!-- SUPABASE -->
  <!-- ========================= -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

  <!-- CONEXÃO -->
  <script src="js/supabase.js" defer></script>

  <!-- BASE -->
  <script src="js/model.js" defer></script>
  <script src="js/state.js" defer></script>
  <script src="js/utils.js" defer></script>

  <!-- MÓDULOS -->
  <script src="js/lotes.js" defer></script>
  <script src="js/mapa.js" defer></script>
  <script src="js/modal.js" defer></script>
  <script src="js/expedicao.js" defer></script>
  <script src="js/busca.js" defer></script>
  <script src="js/dashboard.js" defer></script>

  <!-- INTERFACE -->
  <script src="js/header.js" defer></script>
  <script src="js/login.js" defer></script>

  <!-- INICIALIZAÇÃO -->
  <script src="js/main.js" defer></script>

</head>

<body>

<!-- ========================= -->
<!-- HEADER DINÂMICO -->
<!-- ========================= -->
<div id="header-container"></div>

<h1>Gerenciamento de Gaylords</h1>

<!-- ========================= -->
<!-- BUSCA -->
<!-- ========================= -->
<div class="busca">
  <input id="buscaInput" placeholder="Buscar por lote ou RZ">
  <button onclick="buscar()">Buscar</button>
  <button onclick="limparBusca()">Limpar Destaque</button>
</div>

<!-- ========================= -->
<!-- CADASTRAR ÁREA -->
<!-- ========================= -->
<section class="cadastros">
  <h2>Cadastrar Área</h2>
  <input id="areaNome" placeholder="Nome da área">
  <button onclick="cadastrarArea()">Cadastrar Área</button>
</section>

<!-- ========================= -->
<!-- CADASTRAR LOTE -->
<!-- ========================= -->
<section class="cadastros">
  <h2>Cadastrar Lote</h2>

  <input id="loteNome" placeholder="Nome do lote">

  <input 
    id="loteTotal" 
    type="number" 
    min="1"
    placeholder="Quantidade total"
  >

  <button onclick="cadastrarLote()">Cadastrar Lote</button>
</section>

<!-- ========================= -->
<!-- MAPA -->
<!-- ========================= -->
<section id="mapa"></section>

<!-- ========================= -->
<!-- RESUMO GERAL -->
<!-- ========================= -->
<section class="dashboard-resumo">

  <div class="card">
    <h3>Lotes</h3>
    <span id="resumoLotes">0</span>
  </div>

  <div class="card">
    <h3>Alocados</h3>
    <span id="resumoAlocados">0</span>
  </div>

  <div class="card">
    <h3>Não Alocados</h3>
    <span id="resumoNaoAlocados">0</span>
  </div>

  <div class="card">
    <h3>Expedidos</h3>
    <span id="resumoExpedidos">0</span>
  </div>

  <div class="card">
    <h3>Saldo</h3>
    <span id="resumoSaldo">0</span>
  </div>

</section>

<!-- ========================= -->
<!-- LOTES ATIVOS -->
<!-- ========================= -->
<h2>Lotes Ativos</h2>
<div id="lotesAtivos"></div>

<!-- ========================= -->
<!-- LOTES EXPEDIDOS -->
<!-- ========================= -->
<h2>Lotes Expedidos</h2>
<div id="lotesExpedidos"></div>

<!-- ========================= -->
<!-- MODAL ENDEREÇAMENTO -->
<!-- ========================= -->
<div id="modal" class="modal hidden">
  <div class="modal-content">

    <h3 id="modalTitulo">Endereçar Gaylord</h3>

    <label>Lote:
      <select id="modalLote"></select>
    </label>

    <label>Volume:
      <input id="modalVolume">
    </label>

    <label>RZ:
      <input id="modalRz">
    </label>

    <div class="acoes">
      <button onclick="confirmarEndereco()">Salvar</button>
      <button onclick="removerGaylord()">Remover</button>
      <button onclick="fecharModal()">Cancelar</button>
    </div>

  </div>
</div>

<!-- ========================= -->
<!-- MODAL EXPEDIÇÃO -->
<!-- ========================= -->
<div id="modalExpedicao" class="modal hidden">
  <div class="modal-content" style="width:500px; max-height:80vh; overflow:auto">

    <h3>Expedir Gaylords</h3>

    <div style="margin-bottom:10px;">
      <button onclick="selecionarTodosGaylords()">Selecionar todos</button>
      <button onclick="desmarcarTodosGaylords()">Desmarcar todos</button>
    </div>

    <div id="listaExpedicao"></div>

    <div class="acoes">
      <button onclick="confirmarExpedicao()">Confirmar</button>
      <button onclick="fecharModalExpedicao()">Cancelar</button>
    </div>

  </div>
</div>

</body>
</html>
